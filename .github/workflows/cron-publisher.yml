# This workflow runs your Publisher service on a schedule via HTTP request.

name: PaperPulse Publisher Cron

on:
  schedule:
    # Runs every 30 minutes (This uses standard cron syntax)
    - cron: '*/30 * * * *'
  
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions UI for testing

env:
  # 1. Replace with your actual public Railway domain
  RAILWAY_URL: https://paperpulse-publisher-production.up.railway.app 

jobs:
  run_scheduled_publisher:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PaperPulse Publisher Job
        run: |
          # Use curl to send a POST request to your deployed function.
          # The -s flag silences the progress bar.
          # The -S flag shows the error if the request fails.
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "X-CRON-SECRET: ${{ secrets.CRON_SECRET }}" \
            "${{ env.RAILWAY_URL }}"
        env:
          # 2. Store the secret token in GitHub Repository Secrets.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
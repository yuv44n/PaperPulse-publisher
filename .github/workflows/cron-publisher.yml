name: PaperPulse Publisher Cron

on:
  schedule:
    - cron: '*/30 * * * *'
  
  workflow_dispatch:

env:
  RAILWAY_URL: https://paperpulse-publisher-production.up.railway.app 

jobs:
  run_scheduled_publisher:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger PaperPulse Publisher Job
        run: |
          # The curl command sends a POST request with the required secret header 
          # (X-CRON-SECRET) to execute the runPublisher function on Railway.
          curl -sS -X POST \
            -H "Content-Type: application/json" \
            -H "X-CRON-SECRET: ${{ secrets.CRON_SECRET }}" \
            "${{ env.RAILWAY_URL }}"
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}